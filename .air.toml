root = "."
tmp_dir = ".air-tmp"

[build]
cmd = "go build -o ./publisher ./cmd/publisher"
entrypoint = "./publisher"
full_bin = "ENV_FILE=.env ./publisher"
include_ext = ["go", "tpl", "tmpl", "html", "css", "js", "json", "yaml", "yml"]
exclude_dir = [".git", ".air-tmp", "data", "tmp", "vendor"]
exclude_file = []
exclude_regex = ["_test.go"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = "200ms"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
