openapi: 3.1.0
info:
  title: Publisher API
  version: 0.1.0
  description: API mínima para programación de publicaciones en X orientada a consumo por LLMs.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
  - apiKeyAuth: []
  - basicAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /media:
    post:
      summary: Sube un archivo multimedia
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                platform:
                  type: string
                  enum: [x]
                  default: x
                kind:
                  type: string
                  enum: [video, image]
                  default: video
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Media creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/Error'
  /posts:
    post:
      summary: Crea una publicación programada
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, text, scheduled_at]
              properties:
                platform:
                  type: string
                  enum: [x]
                text:
                  type: string
                scheduled_at:
                  type: string
                  format: date-time
                max_attempts:
                  type: integer
                  minimum: 1
                  default: 3
                media_ids:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '200':
          description: Repetición idempotente (devuelve el post existente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /posts/validate:
    post:
      summary: Valida una publicación sin persistirla (dry-run)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, text, scheduled_at]
              properties:
                platform:
                  type: string
                  enum: [x]
                text:
                  type: string
                scheduled_at:
                  type: string
                  format: date-time
                max_attempts:
                  type: integer
                  minimum: 1
                  default: 3
                media_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Validación correcta
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  normalized:
                    type: object
                    properties:
                      platform:
                        type: string
                      text:
                        type: string
                      scheduled_at:
                        type: string
                        format: date-time
                      media_ids:
                        type: array
                        items:
                          type: string
                      max_attempts:
                        type: integer
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /schedule:
    get:
      summary: Lista publicaciones por rango
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de publicaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/Error'
  /posts/{id}/cancel:
    post:
      summary: Cancela una publicación en estado scheduled
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancelado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: canceled
        '409':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /dlq:
    get:
      summary: Lista entradas en dead-letter queue
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Lista de elementos DLQ
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeadLetter'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /dlq/{id}/requeue:
    post:
      summary: Reencola un post que estaba en DLQ
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post reencolado
          content:
            application/json:
              schema:
                type: object
                properties:
                  dead_letter_id:
                    type: string
                  post:
                    $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    basicAuth:
      type: http
      scheme: basic
  responses:
    Error:
      description: Error de validación o negocio
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
  schemas:
    Media:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
        kind:
          type: string
        original_name:
          type: string
        storage_path:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
    Post:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
        text:
          type: string
        status:
          type: string
          enum: [scheduled, publishing, published, failed, canceled]
        scheduled_at:
          type: string
          format: date-time
        next_retry_at:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
        max_attempts:
          type: integer
        idempotency_key:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        external_id:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        media:
          type: array
          items:
            $ref: '#/components/schemas/Media'
    DeadLetter:
      type: object
      properties:
        id:
          type: string
        post_id:
          type: string
        reason:
          type: string
        last_error:
          type: string
        attempted_at:
          type: string
          format: date-time
