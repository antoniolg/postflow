openapi: 3.1.0
info:
  title: PostFlow API
  version: 0.2.0
  description: v2 API for multi-network, multi-account publishing via account_id.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
  - apiKeyAuth: []
  - basicAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /accounts:
    get:
      summary: List connected/registered accounts
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'

  /accounts/static:
    post:
      summary: Create or update a static account and store encrypted credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStaticAccountRequest'
      responses:
        '201':
          description: Account created/updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/Error'

  /accounts/{id}/disconnect:
    post:
      summary: Mark an account as disconnected
      parameters:
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Disconnected account
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: disconnected
        '404':
          $ref: '#/components/responses/Error'

  /accounts/{id}/connect:
    post:
      summary: Mark an account as connected
      parameters:
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Connected account
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: connected
        '404':
          $ref: '#/components/responses/Error'

  /accounts/{id}/x-premium:
    post:
      summary: Set X premium flag (X accounts only)
      parameters:
        - $ref: '#/components/parameters/AccountID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x_premium]
              properties:
                x_premium:
                  type: boolean
      responses:
        '200':
          description: X premium updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  x_premium:
                    type: boolean
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'

  /accounts/{id}:
    delete:
      summary: Delete a disconnected account with no linked posts
      parameters:
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /oauth/{platform}/start:
    post:
      summary: Start OAuth for a supported platform
      description: Supported OAuth platforms are linkedin, facebook, and instagram. X uses static credentials via /accounts/static.
      parameters:
        - $ref: '#/components/parameters/PlatformPath'
      responses:
        '200':
          description: Authorization URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  platform:
                    $ref: '#/components/schemas/OAuthPlatform'
                  auth_url:
                    type: string
                  state:
                    type: string
                  expires:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/Error'

  /oauth/{platform}/callback:
    get:
      summary: Complete OAuth and create/update account(s)
      description: Supported OAuth platforms are linkedin, facebook, and instagram. X uses static credentials via /accounts/static.
      parameters:
        - $ref: '#/components/parameters/PlatformPath'
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connected accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  platform:
                    $ref: '#/components/schemas/OAuthPlatform'
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/Error'

  /media:
    post:
      summary: Upload a media file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                kind:
                  type: string
                  enum: [video, image]
                  default: video
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Media created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/Error'
    get:
      summary: List uploaded media
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Media list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MediaListItem'

  /media/{id}:
    delete:
      summary: Delete media if not in use
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  media:
                    $ref: '#/components/schemas/MediaListItem'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /posts:
    post:
      summary: Create a draft or scheduled post
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Post'
                  - $ref: '#/components/schemas/CreatePostBatchResponse'
        '200':
          description: Idempotent replay (existing post)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Post'
                  - $ref: '#/components/schemas/CreatePostBatchResponse'
        '400':
          $ref: '#/components/responses/Error'

  /posts/validate:
    post:
      summary: Validate a post without persisting it (dry-run)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: Validation succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  normalized:
                    type: object
                    properties:
                      account_id:
                        type: string
                      platform:
                        $ref: '#/components/schemas/Platform'
                      text:
                        type: string
                      scheduled_at:
                        type: string
                        format: date-time
                      media_ids:
                        type: array
                        items:
                          type: string
                      segments:
                        type: array
                        items:
                          $ref: '#/components/schemas/ThreadSegmentInput'
                      max_attempts:
                        type: integer
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/Error'

  /posts/{id}/cancel:
    post:
      summary: Cancel a scheduled post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post canceled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: canceled
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /posts/{id}/schedule:
    post:
      summary: Schedule a draft post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduled_at]
              properties:
                scheduled_at:
                  type: string
                  description: RFC3339 or datetime-local value in UI timezone
      responses:
        '200':
          description: Post scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: scheduled
                  post:
                    $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /posts/{id}/edit:
    post:
      summary: Edit an editable post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: >
                Use `text` + `media_ids` for a single editable post, or `segments` to replace an
                editable thread while keeping the same root post.
              oneOf:
                - required: [text]
                - required: [segments]
              type: object
              properties:
                text:
                  type: string
                  description: Root post text for single-post edits.
                intent:
                  type: string
                  description: Optional mode override (draft|schedule|publish_now)
                scheduled_at:
                  type: string
                  description: Optional RFC3339 or datetime-local value in UI timezone. If omitted with empty intent, current scheduling is preserved.
                media_ids:
                  type: array
                  items:
                    type: string
                  description: Optional replacement media IDs. Pass an empty array to remove all media.
                segments:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/ThreadSegmentInput'
      responses:
        '200':
          description: Post edited
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                  post:
                    $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /posts/{id}/delete:
    post:
      summary: Delete an editable post (not published/publishing)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  deleted:
                    type: boolean
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /drafts:
    get:
      summary: List draft posts (no scheduled date)
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
      responses:
        '200':
          description: Draft list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  drafts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'

  /schedule:
    get:
      summary: List posts by range
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Post list
          content:
            application/json:
              schema:
                type: object
                properties:
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'

  /dlq:
    get:
      summary: List dead-letter queue entries
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: DLQ item list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeadLetter'

  /dlq/requeue:
    post:
      summary: Requeue multiple DLQ entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bulk requeue result
          content:
            application/json:
              schema:
                type: object
                properties:
                  selected:
                    type: integer
                  success:
                    type: integer
                  failed:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'

  /dlq/delete:
    post:
      summary: Delete multiple DLQ entries and their failed posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  selected:
                    type: integer
                  success:
                    type: integer
                  failed:
                    type: integer
        '400':
          $ref: '#/components/responses/Error'

  /dlq/{id}/requeue:
    post:
      summary: Requeue one post from DLQ
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post requeued
          content:
            application/json:
              schema:
                type: object
                properties:
                  dead_letter_id:
                    type: string
                  post:
                    $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /dlq/{id}/delete:
    post:
      summary: Delete one DLQ entry and its failed post
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entry deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  dead_letter_id:
                    type: string
                  deleted:
                    type: boolean
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /settings/timezone:
    post:
      summary: Set UI timezone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timezone]
              properties:
                timezone:
                  type: string
                  example: Europe/Madrid
      responses:
        '200':
          description: Timezone updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  timezone:
                    type: string
        '400':
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    basicAuth:
      type: http
      scheme: basic

  parameters:
    AccountID:
      in: path
      name: id
      required: true
      schema:
        type: string
    PlatformPath:
      in: path
      name: platform
      required: true
      schema:
        $ref: '#/components/schemas/OAuthPlatform'

  responses:
    Error:
      description: Validation or business error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

  schemas:
    Platform:
      type: string
      enum: [x, linkedin, facebook, instagram]

    OAuthPlatform:
      type: string
      enum: [linkedin, facebook, instagram]

    Account:
      type: object
      properties:
        id:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        display_name:
          type: string
        external_account_id:
          type: string
        auth_method:
          type: string
          enum: [static, oauth]
        status:
          type: string
          enum: [connected, disconnected, error]
        last_error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateStaticAccountRequest:
      type: object
      required: [platform, external_account_id, credentials]
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
        display_name:
          type: string
        external_account_id:
          type: string
        credentials:
          type: object
          additionalProperties: true

    CreatePostRequest:
      type: object
      required: [account_id]
      description: >
        Backward compatible payload. Use `text` + `media_ids` for single post, or `segments` for
        thread creation/editing. When `segments` is present, `text`/`media_ids` are treated as legacy
        compatibility fields and the first segment is used as canonical root content.
      oneOf:
        - required: [text]
        - required: [segments]
      properties:
        account_id:
          type: string
        account_ids:
          type: array
          items:
            type: string
          description: Optional multi-account fanout. If omitted, `account_id` is used.
        text:
          type: string
          description: Root post text for legacy single-post payloads.
        scheduled_at:
          type: string
          format: date-time
          description: Optional. Empty value creates a draft.
        max_attempts:
          type: integer
          minimum: 1
          default: 3
        media_ids:
          type: array
          items:
            type: string
          description: Legacy root media IDs for single-post payloads.
        segments:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/ThreadSegmentInput'

    ThreadSegmentInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
        media_ids:
          type: array
          items:
            type: string

    CreatePostBatchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        created_count:
          type: integer
        total:
          type: integer
        root_id:
          type: string
          nullable: true
        total_steps:
          type: integer
          nullable: true

    Media:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        original_name:
          type: string
        storage_path:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        usage_count:
          type: integer
        in_use:
          type: boolean
        preview_url:
          type: string

    MediaListItem:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        original_name:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        usage_count:
          type: integer
        in_use:
          type: boolean
        preview_url:
          type: string

    Post:
      type: object
      properties:
        id:
          type: string
        account_id:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        text:
          type: string
        status:
          type: string
          enum: [draft, scheduled, publishing, published, failed, canceled]
        scheduled_at:
          type: string
          format: date-time
        thread_group_id:
          type: string
        thread_position:
          type: integer
        parent_post_id:
          type: string
          nullable: true
        root_post_id:
          type: string
          nullable: true
        next_retry_at:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
        max_attempts:
          type: integer
        idempotency_key:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        external_id:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaListItem'

    DeadLetter:
      type: object
      properties:
        id:
          type: string
        post_id:
          type: string
        reason:
          type: string
        last_error:
          type: string
        attempted_at:
          type: string
          format: date-time
