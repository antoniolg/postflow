openapi: 3.1.0
info:
  title: Publisher API
  version: 0.2.0
  description: API v2 para publicación multi-red y multi-cuenta por account_id.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
  - apiKeyAuth: []
  - basicAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /accounts:
    get:
      summary: Lista cuentas conectadas/registradas
      responses:
        '200':
          description: Lista de cuentas
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'

  /accounts/static:
    post:
      summary: Crea o actualiza cuenta estática y guarda credenciales cifradas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStaticAccountRequest'
      responses:
        '201':
          description: Cuenta creada/actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/Error'

  /accounts/{id}/disconnect:
    post:
      summary: Marca una cuenta como desconectada
      parameters:
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Cuenta desconectada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: disconnected
        '404':
          $ref: '#/components/responses/Error'

  /accounts/{id}:
    delete:
      summary: Elimina una cuenta desconectada sin posts asociados
      parameters:
        - $ref: '#/components/parameters/AccountID'
      responses:
        '200':
          description: Cuenta eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  id:
                    type: string
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /oauth/{platform}/start:
    post:
      summary: Inicia OAuth para una plataforma
      parameters:
        - $ref: '#/components/parameters/PlatformPath'
      responses:
        '200':
          description: URL de autorización
          content:
            application/json:
              schema:
                type: object
                properties:
                  platform:
                    $ref: '#/components/schemas/Platform'
                  auth_url:
                    type: string
                  state:
                    type: string
                  expires:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/Error'

  /oauth/{platform}/callback:
    get:
      summary: Completa OAuth y crea/actualiza cuenta(s)
      parameters:
        - $ref: '#/components/parameters/PlatformPath'
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cuentas conectadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  platform:
                    $ref: '#/components/schemas/Platform'
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/Error'

  /media:
    post:
      summary: Sube un archivo multimedia
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                kind:
                  type: string
                  enum: [video, image]
                  default: video
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Media creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '400':
          $ref: '#/components/responses/Error'
    get:
      summary: Lista media subida
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Lista de media
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MediaListItem'

  /media/{id}:
    delete:
      summary: Borra media si no está en uso
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media borrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  media:
                    $ref: '#/components/schemas/MediaListItem'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /posts:
    post:
      summary: Crea una publicación draft o scheduled
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: Post creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '200':
          description: Repetición idempotente (post existente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/Error'

  /posts/validate:
    post:
      summary: Valida una publicación sin persistirla (dry-run)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: Validación correcta
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  normalized:
                    type: object
                    properties:
                      account_id:
                        type: string
                      platform:
                        $ref: '#/components/schemas/Platform'
                      text:
                        type: string
                      scheduled_at:
                        type: string
                        format: date-time
                      media_ids:
                        type: array
                        items:
                          type: string
                      max_attempts:
                        type: integer
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/Error'

  /posts/{id}/cancel:
    post:
      summary: Cancela una publicación scheduled
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post cancelado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                    example: canceled
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /schedule:
    get:
      summary: Lista publicaciones por rango
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de publicaciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'

  /dlq:
    get:
      summary: Lista entradas de dead-letter queue
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Lista de elementos DLQ
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeadLetter'

  /dlq/{id}/requeue:
    post:
      summary: Reencola un post que estaba en DLQ
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post reencolado
          content:
            application/json:
              schema:
                type: object
                properties:
                  dead_letter_id:
                    type: string
                  post:
                    $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    basicAuth:
      type: http
      scheme: basic

  parameters:
    AccountID:
      in: path
      name: id
      required: true
      schema:
        type: string
    PlatformPath:
      in: path
      name: platform
      required: true
      schema:
        $ref: '#/components/schemas/Platform'

  responses:
    Error:
      description: Error de validación o negocio
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string

  schemas:
    Platform:
      type: string
      enum: [x, linkedin, facebook, instagram]

    Account:
      type: object
      properties:
        id:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        display_name:
          type: string
        external_account_id:
          type: string
        auth_method:
          type: string
          enum: [static, oauth]
        status:
          type: string
          enum: [connected, disconnected, error]
        last_error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateStaticAccountRequest:
      type: object
      required: [platform, external_account_id, credentials]
      properties:
        platform:
          $ref: '#/components/schemas/Platform'
        display_name:
          type: string
        external_account_id:
          type: string
        credentials:
          type: object
          additionalProperties: true

    CreatePostRequest:
      type: object
      required: [account_id, text]
      properties:
        account_id:
          type: string
        text:
          type: string
        scheduled_at:
          type: string
          format: date-time
          description: Opcional. Vacío crea draft.
        max_attempts:
          type: integer
          minimum: 1
          default: 3
        media_ids:
          type: array
          items:
            type: string

    Media:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        original_name:
          type: string
        storage_path:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        usage_count:
          type: integer
        in_use:
          type: boolean
        preview_url:
          type: string

    MediaListItem:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        original_name:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        usage_count:
          type: integer
        in_use:
          type: boolean
        preview_url:
          type: string

    Post:
      type: object
      properties:
        id:
          type: string
        account_id:
          type: string
        platform:
          $ref: '#/components/schemas/Platform'
        text:
          type: string
        status:
          type: string
          enum: [draft, scheduled, publishing, published, failed, canceled]
        scheduled_at:
          type: string
          format: date-time
        next_retry_at:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
        max_attempts:
          type: integer
        idempotency_key:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        external_id:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaListItem'

    DeadLetter:
      type: object
      properties:
        id:
          type: string
        post_id:
          type: string
        reason:
          type: string
        last_error:
          type: string
        attempted_at:
          type: string
          format: date-time
