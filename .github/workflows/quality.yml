name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      COVERAGE_MIN: "50"
      COVERAGE_MIN_WORKER: "80"
      COVERAGE_MIN_API: "60"
      COVERAGE_MIN_CLI: "40"
      COVERAGE_MIN_DB: "55"
      COVERAGE_MIN_PUBLISHER: "50"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify gofmt
        run: |
          FILES="$(git ls-files '*.go')"
          if [ -z "$FILES" ]; then
            exit 0
          fi
          UNFORMATTED="$(gofmt -l $FILES)"
          if [ -n "$UNFORMATTED" ]; then
            echo "These files need gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0
          args: --config .golangci.yml --timeout=5m

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Coverage
        run: ./scripts/check-coverage.sh

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
