name: Release CLI + Homebrew

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example: v0.1.0)"
        required: true

permissions:
  contents: write

env:
  BIN_NAME: postflow
  FORMULA_NAME: postflow
  HOMEBREW_TAP_REPO: antoniolg/homebrew-tap
  GH_REPO: antoniolg/postflow

jobs:
  build-release-cli:
    name: build-release-cli
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            echo "tag is required" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Checkout selected tag (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          git checkout "${{ steps.vars.outputs.tag }}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI archives
        id: build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${{ steps.vars.outputs.version }}"
          TAG="${{ steps.vars.outputs.tag }}"
          BIN_NAME="${BIN_NAME}"
          FORMULA_NAME="${FORMULA_NAME}"
          CMD_PATH="./cmd/postflow"

          build_target() {
            local GOOS="$1"
            local GOARCH="$2"
            local OUT_DIR="dist/${BIN_NAME}_${VERSION}_${GOOS}_${GOARCH}"
            local ARCHIVE="dist/${FORMULA_NAME}_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
            mkdir -p "${OUT_DIR}"
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build -trimpath -ldflags "-s -w -X github.com/antoniolg/postflow/internal/cli.Version=${TAG}" \
              -o "${OUT_DIR}/${BIN_NAME}" "${CMD_PATH}"
            tar -C "${OUT_DIR}" -czf "${ARCHIVE}" "${BIN_NAME}"
          }

          build_target darwin amd64
          build_target darwin arm64
          build_target linux amd64
          build_target linux arm64

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.vars.outputs.tag }}" dist/${FORMULA_NAME}_${{ steps.vars.outputs.version }}_*.tar.gz --repo "${GH_REPO}" --clobber

      - name: Compute checksums
        id: sums
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          FORMULA_NAME="${FORMULA_NAME}"
          SUM_DARWIN_AMD64="$(sha256sum "dist/${FORMULA_NAME}_${VERSION}_darwin_amd64.tar.gz" | awk '{print $1}')"
          SUM_DARWIN_ARM64="$(sha256sum "dist/${FORMULA_NAME}_${VERSION}_darwin_arm64.tar.gz" | awk '{print $1}')"
          SUM_LINUX_AMD64="$(sha256sum "dist/${FORMULA_NAME}_${VERSION}_linux_amd64.tar.gz" | awk '{print $1}')"
          SUM_LINUX_ARM64="$(sha256sum "dist/${FORMULA_NAME}_${VERSION}_linux_arm64.tar.gz" | awk '{print $1}')"
          echo "sum_darwin_amd64=${SUM_DARWIN_AMD64}" >> "${GITHUB_OUTPUT}"
          echo "sum_darwin_arm64=${SUM_DARWIN_ARM64}" >> "${GITHUB_OUTPUT}"
          echo "sum_linux_amd64=${SUM_LINUX_AMD64}" >> "${GITHUB_OUTPUT}"
          echo "sum_linux_arm64=${SUM_LINUX_ARM64}" >> "${GITHUB_OUTPUT}"

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN not configured; skipping Homebrew formula update."
            exit 0
          fi
          VERSION="${{ steps.vars.outputs.version }}"
          TAG="${{ steps.vars.outputs.tag }}"
          FORMULA_NAME="${FORMULA_NAME}"
          BIN_NAME="${BIN_NAME}"
          GH_REPO="${GH_REPO}"

          TAP_DIR="$(mktemp -d)"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "${TAP_DIR}"
          rm -f "${TAP_DIR}/Formula/postflow-cli.rb"

          cat > "${TAP_DIR}/Formula/${FORMULA_NAME}.rb" <<EOF
          # typed: false
          # frozen_string_literal: true

          # This file was generated by GitHub Actions. DO NOT EDIT.
          class Postflow < Formula
            desc "CLI for PostFlow publishing workflows."
            homepage "https://github.com/${GH_REPO}"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/${GH_REPO}/releases/download/${TAG}/${FORMULA_NAME}_${VERSION}_darwin_amd64.tar.gz"
                sha256 "${{ steps.sums.outputs.sum_darwin_amd64 }}"

                def install
                  bin.install "${BIN_NAME}"
                end
              end
              if Hardware::CPU.arm?
                url "https://github.com/${GH_REPO}/releases/download/${TAG}/${FORMULA_NAME}_${VERSION}_darwin_arm64.tar.gz"
                sha256 "${{ steps.sums.outputs.sum_darwin_arm64 }}"

                def install
                  bin.install "${BIN_NAME}"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/${GH_REPO}/releases/download/${TAG}/${FORMULA_NAME}_${VERSION}_linux_amd64.tar.gz"
                sha256 "${{ steps.sums.outputs.sum_linux_amd64 }}"

                def install
                  bin.install "${BIN_NAME}"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/${GH_REPO}/releases/download/${TAG}/${FORMULA_NAME}_${VERSION}_linux_arm64.tar.gz"
                sha256 "${{ steps.sums.outputs.sum_linux_arm64 }}"

                def install
                  bin.install "${BIN_NAME}"
                end
              end
            end

            test do
              system "#{bin}/${BIN_NAME}", "--help"
            end
          end
          EOF

          cd "${TAP_DIR}"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No Homebrew changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "Formula/${FORMULA_NAME}.rb"
          git commit -m "${FORMULA_NAME} ${TAG}"
          git push origin main
